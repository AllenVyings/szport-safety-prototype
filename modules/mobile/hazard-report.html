<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隐患上报 - 移动端</title>
  <link rel="stylesheet" href="../../css/variables.css?v=2.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); background: var(--bg-dark-primary); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding: 12px 20px 20px; }
    .simulator-label { color: var(--text-inverse); font-size: 14px; margin-bottom: 16px; opacity: 0.7; letter-spacing: 1px; }
    .phone-frame { width: 375px; height: 740px; background: var(--bg-gray-lighter); border-radius: 32px; box-shadow: 0 0 0 8px var(--bg-dark-secondary), 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; position: relative; display: flex; flex-direction: column; }
    .phone-statusbar { height: 44px; background: var(--brand); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; color: var(--text-inverse); font-size: 12px; flex-shrink: 0; }
    .mobile-nav { background: var(--brand); padding: 10px 16px; display: flex; align-items: center; gap: 12px; color: var(--text-inverse); flex-shrink: 0; }
    .mobile-nav-back { font-size: 18px; cursor: pointer; }
    .mobile-nav-title { font-size: 17px; font-weight: 600; }
    .mobile-content { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; background: var(--bg-gray-lighter); }
    .form-card { background: var(--bg-card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .form-card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; padding-left: 8px; border-left: 3px solid var(--primary); }
    .m-form-group { margin-bottom: 14px; }
    .m-form-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .m-form-label .req { color: var(--error); }
    .m-form-input { width: 100%; height: 36px; border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .m-form-input:focus { border-color: var(--primary); }
    .m-form-select { width: 100%; height: 36px; border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-size: 14px; outline: none; background: var(--bg-card); }
    .m-form-textarea { width: 100%; min-height: 80px; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; resize: vertical; }
    .m-form-textarea:focus { border-color: var(--primary); }
    .photo-upload { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .photo-item { aspect-ratio: 1; border: 1px dashed var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; background: var(--bg-gray-lighter); }
    .photo-item.add { border-color: var(--primary); color: var(--primary); }
    .photo-item.add:active { background: var(--primary-5); }
    .photo-item .photo-icon { font-size: 24px; margin-bottom: 4px; }
    .location-row { display: flex; gap: 8px; align-items: center; }
    .location-row .m-form-input { flex: 1; }
    .location-btn { height: 36px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--primary); background: var(--primary-5); color: var(--primary); font-size: 13px; cursor: pointer; white-space: nowrap; }
    .submit-bar { padding: 12px 16px 20px; background: var(--bg-card); border-top: 1px solid var(--border-light); display: flex; gap: 10px; flex-shrink: 0; }
    .submit-btn { flex: 1; height: 44px; border-radius: 22px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
    .submit-btn.primary { background: var(--primary); color: var(--text-inverse); }
    .submit-btn.secondary { background: var(--bg-gray-lighter); color: var(--text-primary); }
  </style>
  <script src="../../js/common.js?v=2.0"></script>
</head>
<body>
  <div class="simulator-label">移动端原型模拟 (375 x 812)</div>
  <div class="phone-frame">
    <div class="phone-statusbar"><span>09:41</span><span>5G 100%</span></div>
    <div class="mobile-nav">
      <span class="mobile-nav-back" data-action="goBack">&larr;</span>
      <span class="mobile-nav-title">隐患上报</span>
    </div>
    <div class="mobile-content">
      <div class="form-card">
        <div class="form-card-title">隐患信息</div>
        <div class="m-form-group">
          <div class="m-form-label"><span class="req">*</span>隐患描述</div>
          <textarea class="m-form-textarea" id="hazardDesc" placeholder="请描述隐患情况..."></textarea>
        </div>
        <div class="m-form-group">
          <div class="m-form-label"><span class="req">*</span>隐患等级</div>
          <select class="m-form-select" id="hazardLevel">
            <option value="">请选择</option>
            <option>一般隐患</option>
            <option>重大隐患</option>
          </select>
        </div>
        <div class="m-form-group">
          <div class="m-form-label"><span class="req">*</span>隐患类型</div>
          <select class="m-form-select" id="hazardType">
            <option value="">请选择</option>
            <option>人的不安全行为</option>
            <option>物的不安全状态</option>
            <option>环境不良</option>
            <option>管理缺陷</option>
          </select>
        </div>
        <div class="m-form-group">
          <div class="m-form-label">发现部位</div>
          <input class="m-form-input" id="hazardLocation" placeholder="如：1号泊位门机MH-01">
        </div>
      </div>
      <div class="form-card">
        <div class="form-card-title">现场照片</div>
        <div class="photo-upload">
          <div class="photo-item add" data-action="showToast" data-param="打开相机拍照"><div class="photo-icon">📷</div>拍照</div>
          <div class="photo-item add" data-action="showToast" data-param="从相册选择"><div class="photo-icon">🖼</div>相册</div>
          <div class="photo-item" style="border:none;background:none;"></div>
        </div>
      </div>
      <div class="form-card">
        <div class="form-card-title">定位信息</div>
        <div class="m-form-group">
          <div class="location-row">
            <input class="m-form-input" id="hazardAddr" placeholder="点击获取当前位置" readonly>
            <button class="location-btn" data-action="locatePosition">定位</button>
          </div>
        </div>
      </div>
      <div class="form-card">
        <div class="form-card-title">整改建议</div>
        <div class="m-form-group">
          <div class="m-form-label">建议整改期限</div>
          <input class="m-form-input" id="hazardDeadline" type="date">
        </div>
        <div class="m-form-group">
          <div class="m-form-label">整改要求</div>
          <textarea class="m-form-textarea" id="hazardSuggestion" placeholder="整改措施建议..." style="min-height:60px;"></textarea>
        </div>
      </div>
    </div>
    <div class="submit-bar">
      <button class="submit-btn secondary" data-action="showToast" data-param="已保存为草稿">存草稿</button>
      <button class="submit-btn primary" data-action="submitHazard">提交上报</button>
    </div>
  </div>
  <script>
    function submitHazard() {
      var desc = document.getElementById('hazardDesc').value.trim();
      var level = document.getElementById('hazardLevel').value;
      var type = document.getElementById('hazardType').value;
      if (!desc) { showToast('请填写隐患描述','warning'); return; }
      if (!level) { showToast('请选择隐患等级','warning'); return; }
      if (!type) { showToast('请选择隐患类型','warning'); return; }
      showToast('隐患已上报，编号：YH-20260522-001','success');
    }

    (function() {
      document.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-action]');
        if (!btn) return;
        var action = btn.getAttribute('data-action');
        var param = btn.getAttribute('data-param');
        switch (action) {
          case 'goBack': history.back(); break;
          case 'locatePosition':
            var addr = document.getElementById('hazardAddr');
            if (addr) addr.value = '深圳市盐田区盐田港1号泊位';
            showToast('定位成功', 'success');
            break;
          case 'submitHazard': submitHazard(); break;
          case 'showToast': if (param) showToast(param, 'success'); break;
        }
      });
    })();
  </script>
</body>
</html>
