<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 - 深圳港集团安全综合管理系统</title>
  <link rel="stylesheet" href="../../css/variables.css?v=2.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      background: var(--bg-dark-primary);
      height: 100vh; overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 20px 20px;
    }
    .simulator-label { color: var(--text-inverse); font-size: 14px; margin-bottom: 16px; opacity: 0.7; letter-spacing: 1px; }
    .phone-frame {
      width: 375px; height: 740px; background: var(--bg-gray-lighter);
      border-radius: 32px; box-shadow: 0 0 0 8px var(--bg-dark-secondary), 0 20px 60px rgba(0,0,0,0.5);
      overflow: hidden; position: relative; display: flex; flex-direction: column;
    }
    /* 状态栏 */
    .phone-statusbar {
      height: 44px; background: var(--brand); display: flex; align-items: flex-end;
      justify-content: space-between; padding: 0 24px 8px; color: var(--text-inverse);
      font-size: 12px; flex-shrink: 0;
    }
    /* 顶部用户区 */
    .mobile-header {
      background: linear-gradient(135deg, var(--brand) 0%, var(--primary) 100%);
      padding: 12px 16px 28px; color: var(--text-inverse); flex-shrink: 0;
    }
    .mobile-header-row { display: flex; align-items: center; justify-content: space-between; }
    .mobile-user-info { display: flex; align-items: center; gap: 10px; }
    .mobile-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .mobile-user-name { font-size: 16px; font-weight: 600; }
    .mobile-user-dept { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .mobile-bell {
      position: relative; width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15); display: flex; align-items: center;
      justify-content: center; font-size: 18px; cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .mobile-bell-badge {
      position: absolute; top: 2px; right: 2px; min-width: 16px; height: 16px;
      background: var(--chart-red-light); border-radius: 8px; font-size: 10px;
      display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }
    /* 内容滚动区 */
    .mobile-content {
      flex: 1; min-height: 0; overflow-y: auto; padding: 0 0 60px 0; -webkit-overflow-scrolling: touch;
    }
    /* 待办卡片区 */
    .pending-section { margin: -16px 12px 12px; position: relative; z-index: 1; }
    .section-title {
      font-size: 15px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .section-title .section-icon { font-size: 16px; }
    .pending-cards { display: flex; gap: 10px; }
    .pending-card {
      flex: 1; background: var(--bg-card); border-radius: 10px; padding: 14px 10px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); cursor: pointer;
      text-decoration: none; color: inherit; border: 1px solid var(--border-light);
      transition: box-shadow 0.15s;
    }
    .pending-card:active { box-shadow: 0 2px 8px rgba(35,102,236,0.15); }
    .pending-card .pc-value { font-size: 22px; font-weight: 700; color: var(--primary); }
    .pending-card .pc-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    /* 预警卡片区 */
    .warning-section { margin: 0 12px 12px; }
    .warning-cards { display: flex; gap: 10px; }
    .warning-card {
      flex: 1; background: var(--bg-card); border-radius: 10px; padding: 14px 10px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); cursor: pointer;
      text-decoration: none; color: inherit; border: 1px solid var(--warning-border);
      transition: box-shadow 0.15s;
    }
    .warning-card:active { box-shadow: 0 2px 8px rgba(233,124,0,0.15); }
    .warning-card .wc-value { font-size: 22px; font-weight: 700; color: var(--warning); }
    .warning-card .wc-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .warning-card .wc-badge {
      display: inline-block; font-size: 9px; background: var(--warning-light);
      color: var(--warning); padding: 1px 6px; border-radius: var(--radius-full);
      margin-top: 4px;
    }
    /* 快捷入口区 */
    .quick-entry {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
      padding: 16px 12px; background: var(--bg-card); margin: 0 12px 12px;
      border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .quick-entry-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 8px 0; cursor: pointer; text-decoration: none; color: inherit;
    }
    .quick-entry-icon {
      width: 44px; height: 44px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-size: 22px;
    }
    .quick-entry-icon.scan { background: rgba(35,102,236,0.1); }
    .quick-entry-icon.photo { background: rgba(209,0,0,0.1); }
    .quick-entry-icon.work { background: rgba(233,124,0,0.1); }
    .quick-entry-icon.train { background: rgba(0,177,94,0.1); }
    .quick-entry-label { font-size: 12px; color: var(--text-secondary); }
    /* 最近消息区 */
    .recent-msg-section { margin: 0 12px 16px; }
    .recent-msg-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .recent-msg-header .section-title { margin-bottom: 0; }
    .recent-msg-more { font-size: 12px; color: var(--primary); text-decoration: none; }
    .msg-card {
      background: var(--bg-card); border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .msg-item {
      display: flex; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border-light);
      cursor: pointer;
    }
    .msg-item:last-child { border-bottom: none; }
    .msg-item:active { background: var(--bg-hover); }
    .msg-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .msg-body { flex: 1; min-width: 0; }
    .msg-title {
      font-size: 13px; color: var(--text-primary); line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .msg-time { font-size: 11px; color: var(--text-description); margin-top: 4px; }
    .msg-unread {
      width: 8px; height: 8px; border-radius: 50%; background: var(--error);
      flex-shrink: 0; margin-top: 6px;
    }
    /* 底部Tab栏 */
    .mobile-tabbar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
      background: var(--bg-card); border-top: 1px solid var(--border-light);
      display: flex; align-items: center; justify-content: space-around;
      flex-shrink: 0; z-index: 10;
    }
    .tabbar-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      cursor: pointer; padding: 4px 12px; text-decoration: none; color: inherit;
    }
    .tabbar-item .tabbar-icon { font-size: 20px; color: var(--text-description); }
    .tabbar-item .tabbar-label { font-size: 10px; color: var(--text-description); }
    .tabbar-item.active .tabbar-icon { color: var(--primary); }
    .tabbar-item.active .tabbar-label { color: var(--primary); font-weight: 600; }
  </style>
  <script src="../../js/common.js?v=2.0"></script>
</head>
<body>

  <div class="simulator-label">移动端原型模拟 (375 x 812)</div>

  <div class="phone-frame">
    <!-- 状态栏 -->
    <div class="phone-statusbar">
      <span>09:41</span>
      <span>5G 100%</span>
    </div>

    <!-- 顶部用户区 -->
    <div class="mobile-header">
      <div class="mobile-header-row">
        <div class="mobile-user-info">
          <div class="mobile-avatar">张</div>
          <div>
            <div class="mobile-user-name">张明</div>
            <div class="mobile-user-dept">盐田国际 · 安环部</div>
          </div>
        </div>
        <a href="mobile-message.html" class="mobile-bell">
          🔔
          <div class="mobile-bell-badge">8</div>
        </a>
      </div>
    </div>

    <!-- 内容区 -->
    <div class="mobile-content">

      <!-- 待办卡片区 -->
      <div class="pending-section">
        <div class="section-title"><span class="section-icon">📋</span>待办事项</div>
        <div class="pending-cards">
          <a href="mobile-approval.html" class="pending-card">
            <div class="pc-value">5</div>
            <div class="pc-label">待审批</div>
          </a>
          <a href="scan-inspection.html" class="pending-card">
            <div class="pc-value">3</div>
            <div class="pc-label">待检查</div>
          </a>
          <a href="my-todo.html" class="pending-card">
            <div class="pc-value">7</div>
            <div class="pc-label">待整改</div>
          </a>
        </div>
      </div>

      <!-- 预警卡片区 -->
      <div class="warning-section">
        <div class="section-title"><span class="section-icon">⚠️</span>预警提醒</div>
        <div class="warning-cards">
          <div class="warning-card">
            <div class="wc-value">2</div>
            <div class="wc-label">巡检逾期</div>
            <span class="wc-badge">需关注</span>
          </div>
          <div class="warning-card">
            <div class="wc-value">4</div>
            <div class="wc-label">证书过期</div>
            <span class="wc-badge">需关注</span>
          </div>
          <div class="warning-card">
            <div class="wc-value">3</div>
            <div class="wc-label">隐患超期</div>
            <span class="wc-badge">需关注</span>
          </div>
        </div>
      </div>

      <!-- 快捷入口区 -->
      <div class="quick-entry">
        <a href="scan-inspection.html" class="quick-entry-item">
          <div class="quick-entry-icon scan">🔍</div>
          <div class="quick-entry-label">巡检</div>
        </a>
        <a href="hazard-report.html" class="quick-entry-item">
          <div class="quick-entry-icon photo">📸</div>
          <div class="quick-entry-label">隐患上报</div>
        </a>
        <a href="mobile-dangerous-work.html" class="quick-entry-item">
          <div class="quick-entry-icon work">⚙️</div>
          <div class="quick-entry-label">作业</div>
        </a>
        <a href="training-learn.html" class="quick-entry-item">
          <div class="quick-entry-icon train">📖</div>
          <div class="quick-entry-label">培训</div>
        </a>
      </div>

      <!-- 最近消息区 -->
      <div class="recent-msg-section">
        <div class="recent-msg-header">
          <div class="section-title"><span class="section-icon">💬</span>最近消息</div>
          <a href="mobile-message.html" class="recent-msg-more">查看全部 ›</a>
        </div>
        <div class="msg-card">
          <div class="msg-item">
            <span class="msg-icon">🔔</span>
            <div class="msg-body">
              <div class="msg-title">隐患整改催办：3号泊位消防栓水压不足整改即将到期</div>
              <div class="msg-time">10分钟前</div>
            </div>
            <span class="msg-unread"></span>
          </div>
          <div class="msg-item">
            <span class="msg-icon">⚠️</span>
            <div class="msg-body">
              <div class="msg-title">台风预警：今年第3号台风预计48小时内影响深圳</div>
              <div class="msg-time">1小时前</div>
            </div>
            <span class="msg-unread"></span>
          </div>
          <div class="msg-item">
            <span class="msg-icon">✅</span>
            <div class="msg-body">
              <div class="msg-title">审批完成：危险作业许可已通过</div>
              <div class="msg-time">昨天 09:15</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /mobile-content -->

    <!-- 底部Tab栏 -->
    <div class="mobile-tabbar">
      <a href="mobile-home.html" class="tabbar-item active">
        <span class="tabbar-icon">🏠</span>
        <span class="tabbar-label">首页</span>
      </a>
      <a href="mobile-function.html" class="tabbar-item">
        <span class="tabbar-icon">📱</span>
        <span class="tabbar-label">功能</span>
      </a>
      <a href="mobile-message.html" class="tabbar-item">
        <span class="tabbar-icon">💬</span>
        <span class="tabbar-label">消息</span>
      </a>
      <a href="mobile-profile.html" class="tabbar-item">
        <span class="tabbar-icon">👤</span>
        <span class="tabbar-label">我的</span>
      </a>
    </div>

  </div><!-- /phone-frame -->

</body>
</html>
