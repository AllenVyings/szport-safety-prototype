<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目人员管理 - 深圳港集团安全综合管理系统</title>
  <link rel="stylesheet" href="../../css/variables.css?v=2.0">
  <link rel="stylesheet" href="../../css/framework.css?v=2.0">
  <link rel="stylesheet" href="../../css/utility.css?v=2.0">
  <style>
    .split-left-title { display:flex; align-items:center; justify-content:space-between; padding-bottom:12px; border-bottom:1px solid var(--border-divider); margin-bottom:12px; font-size:var(--font-size-14); font-weight:600; color:var(--text-primary); flex-shrink:0; }

    .unit-select { width: 100%; margin-bottom: 12px; }
    .tree-label { font-size:var(--font-size-13); font-weight:500; margin-bottom:8px; }
    .project-tree { overflow-y: auto; flex: 1; min-height: 0; }
    .src-node { padding: 5px 6px; border-radius: var(--radius-sm); font-size: var(--font-size-13); cursor: pointer; color: var(--text-primary); display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    .src-node:hover { background: var(--bg-hover); }
    .src-node.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
    .src-node .node-icon { font-size: var(--font-size-10); width: 18px; height: 18px; border-radius: var(--radius-sm); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .src-node .node-icon.project { background: var(--primary-light); color: var(--primary); }
    .src-node .node-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .tag-cert-warning { background: var(--warning-light); color: var(--warning); border: 1px solid var(--warning-border); font-size: var(--font-size-11); }
    .tag-cert-expired { background: var(--error-light); color: var(--error); border: 1px solid var(--error); font-size: var(--font-size-11); }

    .modal-body .form-group { flex-direction: column; gap: 0; margin-bottom: 14px; }
    .modal-body .form-label { width: auto; min-width: 0; text-align: left; line-height: 1; margin-bottom: 6px; font-size: var(--font-size-13); }
  </style>
  <script src="../../js/common.js?v=2.0"></script>
</head>
<body class="u-bg-page-px20" style="overflow:hidden;">

  <!-- 统计卡片 -->
  <div class="stat-bar" id="personnel-stat-bar">
    <div class="stat-item"><div class="stat-num" id="personnel-stat-total">0</div><div class="stat-label">人员总数</div></div>
    <div class="stat-item"><div class="stat-num u-text-success" id="personnel-stat-active">0</div><div class="stat-label">在岗人数</div></div>
    <div class="stat-item"><div class="stat-num u-text-primary" id="personnel-stat-cert">0</div><div class="stat-label">持证人数</div></div>
    <div class="stat-item"><div class="stat-num u-text-description" id="personnel-stat-inactive">0</div><div class="stat-label">已退场</div></div>
  </div>

  <!-- 双卡片布局 -->
  <div style="flex:1; display:flex; gap:16px; min-height:0;">
    <!-- 左侧卡片：筛选面板 -->
    <div class="card" style="width:260px; min-width:260px; display:flex; flex-direction:column; overflow:hidden; padding:20px;">
      <div class="split-left-title">筛选项目</div>
      <select class="form-input form-select unit-select" id="unit-select" data-action="selectPersonnelUnit">
        <option value="">全部单位</option>
      </select>
      <div class="tree-label">项目列表</div>
      <div class="project-tree" id="project-tree">
        <div style="font-size:var(--font-size-12); color:var(--text-description); text-align:center; padding:20px;">加载中...</div>
      </div>
    </div>

    <!-- 右侧卡片：数据区域 -->
    <div class="card u-p-0" style="flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden;">
      <div style="padding:20px 24px 0;">
        <div style="font-size:var(--font-size-14); font-weight:500; margin-bottom:12px;" id="personnel-title">全部项目 - 人员台账</div>
        <div class="filter-actions-row" style="margin-top:0;">
          <button class="btn btn-primary" data-action="showPersonnelAdd">+ 新增人员</button>
          <button class="btn btn-default" data-action="batchDeletePersonnel">批量删除</button>
          <button class="btn btn-default" data-action="exportPersonnel">导出</button>
        </div>
      </div>
      <div class="table-wrap" style="flex:1; min-height:0;">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:40px;"><input type="checkbox" id="personnel-select-all"></th>
              <th style="width:50px;">序号</th>
              <th>姓名</th>
              <th>所属单位</th>
              <th>岗位</th>
              <th>安全资质</th>
              <th>进场日期</th>
              <th>退场日期</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="personnel-tbody"></tbody>
        </table>
        <div class="empty-state" id="personnel-empty">
          <div class="empty-icon">&#128269;</div>
          <div>暂无人员数据</div>
        </div>
      </div>
      <div class="pagination-bar">
        <span class="pagination-info" id="personnel-pagination-info">共 0 条</span>
        <select class="pagination-size"><option value="10" selected>10条/页</option><option value="20">20条/页</option><option value="50">50条/页</option></select>
        <div class="pagination"><div class="pagination-page active">1</div></div>
        <div class="pagination-jump">前往<input type="number" min="1" class="pagination-jump-input">页<button class="btn btn-default btn-sm">跳转</button></div>
      </div>
    </div>
  </div>

  <!-- 新增/编辑人员弹窗 -->
  <div id="personnelFormModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="width:500px;">
      <div class="modal-header">
        <h3 id="personnel-modal-title">新增人员</h3>
        <button class="btn btn-text" data-action="closePersonnelModal">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="personnel-edit-id">
        <div class="form-group">
          <label class="form-label">姓名 <span class="u-text-error-tag">*</span></label>
          <input class="form-input u-w-full" id="personnel-name" placeholder="请输入姓名">
        </div>
        <div class="form-group">
          <label class="form-label">岗位 <span class="u-text-error-tag">*</span></label>
          <input class="form-input u-w-full" id="personnel-position" placeholder="请输入岗位">
        </div>
        <div class="form-group">
          <label class="form-label">安全资质</label>
          <input class="form-input u-w-full" id="personnel-cert" placeholder="如：注册安全工程师">
        </div>
        <div class="form-group">
          <label class="form-label">资质到期日</label>
          <input class="form-input u-w-full" type="date" id="personnel-cert-expiry">
        </div>
        <div class="form-group">
          <label class="form-label">联系电话</label>
          <input class="form-input u-w-full" id="personnel-phone" placeholder="请输入联系电话">
        </div>
        <div class="u-flex u-gap-12">
          <div class="form-group u-flex-1">
            <label class="form-label">进场日期</label>
            <input class="form-input u-w-full" type="date" id="personnel-entry">
          </div>
          <div class="form-group u-flex-1">
            <label class="form-label">退场日期</label>
            <input class="form-input u-w-full" type="date" id="personnel-exit">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">备注</label>
          <input class="form-input u-w-full" id="personnel-remark" placeholder="请输入备注">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" data-action="closePersonnelModal">取消</button>
        <button class="btn btn-primary" data-action="savePersonnel">保存</button>
      </div>
    </div>
  </div>

  <!-- 查看人员弹窗 -->
  <div id="personnelViewModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="width:450px;">
      <div class="modal-header">
        <h3>人员详情</h3>
        <button class="btn btn-text" data-action="closePersonnelModal">&times;</button>
      </div>
      <div class="modal-body" id="personnel-view-content"></div>
      <div class="modal-footer">
        <button class="btn btn-default" data-action="closePersonnelModal">关闭</button>
      </div>
    </div>
  </div>

  <script src="../../modules/system-admin/org-data.js"></script>
  <script src="project-info-data.js"></script>
  <script src="project-personnel-data.js"></script>
  <script src="project-personnel-logic.js"></script>
</body>
</html>
