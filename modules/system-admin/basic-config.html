<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基础配置 - 深圳港集团安全综合管理系统</title>
  <link rel="stylesheet" href="../../css/variables.css?v=2.0">
  <link rel="stylesheet" href="../../css/framework.css?v=2.0">
  <link rel="stylesheet" href="../../css/utility.css?v=2.0">
  <style>
    .bc-layout { display:flex; gap:16px; height:calc(100vh - 120px); min-height:480px; }
    .bc-left { width:240px; flex-shrink:0; }
    .bc-right { flex:1; min-width:0; display:flex; flex-direction:column; }
    .bc-panel { background:var(--bg-card); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); display:flex; flex-direction:column; flex:1; min-height:0; }
    .bc-panel-head { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .bc-panel-head h4 { margin:0; font-size:var(--font-size-14); font-weight:var(--font-weight-semibold); }
    .bc-group-list { flex:1; overflow-y:auto; padding:4px 0; }
    .bc-group-item { display:flex; align-items:center; padding:10px 16px; cursor:pointer; font-size:var(--font-size-13); }
    .bc-group-item:hover { background:var(--bg-hover); }
    .bc-group-item.active { background:var(--primary-light); color:var(--primary); font-weight:var(--font-weight-semibold); }
    .bc-group-item.disabled { color:var(--text-tertiary); cursor:default; }
    .bc-group-count { margin-left:auto; font-size:var(--font-size-11); color:var(--text-tertiary); background:var(--bg-page); padding:1px 6px; border-radius:var(--radius-full); }
    .bc-group-item.active .bc-group-count { background:var(--primary-light); color:var(--primary); }
    .bc-body { flex:1; overflow:auto; padding:0 16px 16px; }
    .bc-breadcrumb { padding:12px 0; font-size:var(--font-size-13); color:var(--text-tertiary); }
    .bc-breadcrumb a { color:var(--primary); cursor:pointer; text-decoration:none; }
    .bc-breadcrumb a:hover { text-decoration:underline; }
    .bc-breadcrumb .current { color:var(--text-primary); font-weight:var(--font-weight-medium); }
    .alert-hint { margin-bottom:12px; }
  </style>
  <script src="../../js/common.js?v=2.0"></script>
</head>
<body class="u-bg-page-px20">

  <div class="alert alert-info alert-hint">
    基础配置（PRD 3.13.6）：为各业务模块提供字典类下拉选项。一期开放「风险管控」「现场管理-危险作业」等分组；危险作业含作业类型、所需持证、许可模板、默认审批链。
  </div>

  <div class="bc-layout">
    <div class="bc-left">
      <div class="bc-panel">
        <div class="bc-panel-head">
          <h4>模块分组</h4>
          <button class="btn btn-text btn-sm" data-action="openCreateGroup">+ 新增</button>
        </div>
        <div class="bc-group-list" id="group-list"></div>
      </div>
    </div>

    <div class="bc-right">
      <!-- 类型视图 -->
      <div class="bc-panel" id="view-types">
        <div class="bc-panel-head">
          <h4 id="types-title">风险管控 — 配置项类型</h4>
          <button class="btn btn-primary btn-sm" data-action="openCreateType">+ 新增配置项类型</button>
        </div>
        <div class="bc-body">
          <div class="filter-bar u-mt-12">
            <div class="filter-field"><span class="filter-label">类型名称</span><input class="form-input" placeholder="请输入" style="width:140px;"></div>
            <div class="filter-bar-actions">
              <button class="btn btn-primary btn-sm" data-action="filterTypes">查询</button>
              <button class="btn btn-default btn-sm" data-action="resetTypeFilter">重置</button>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <colgroup>
                <col style="width:56px">
                <col>
                <col style="width:160px">
                <col style="width:90px">
                <col>
                <col style="width:180px">
              </colgroup>
              <thead>
                <tr>
                  <th>序号</th>
                  <th>配置项类型</th>
                  <th>类型编码</th>
                  <th>选项数量</th>
                  <th>描述</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="types-tbody"></tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <span class="pagination-info" id="bc-type-page-info">共 0 条</span>
            <select class="pagination-size" id="bc-type-page-size" data-action="changeTypePageSize">
              <option value="10" selected>10条/页</option>
              <option value="20">20条/页</option>
              <option value="50">50条/页</option>
            </select>
            <div class="pagination" id="bc-type-pagination"></div>
            <div class="pagination-jump">前往<input type="number" min="1" id="bc-type-jump" class="pagination-jump-input">页<button class="btn btn-default btn-sm" data-action="jumpTypePage">跳转</button></div>
          </div>
        </div>
      </div>

      <!-- 选项视图 -->
      <div class="bc-panel u-none" id="view-options">
        <div class="bc-panel-head">
          <h4 id="options-title">配置选项</h4>
          <button class="btn btn-primary btn-sm" data-action="openCreateOption">+ 新增选项</button>
        </div>
        <div class="bc-body">
          <div class="bc-breadcrumb">
            <a data-action="showTypesView">基础配置</a>
            <span> / </span>
            <a data-action="showTypesView">风险管控</a>
            <span> / </span>
            <span class="current" id="breadcrumb-type"></span>
          </div>
          <div class="filter-bar">
            <div class="filter-field"><span class="filter-label">选项名称</span><input class="form-input" placeholder="请输入" style="width:140px;"></div>
            <div class="filter-field"><span class="filter-label">状态</span>
              <select class="form-input form-select" style="width:100px;">
                <option>全部</option>
                <option>启用</option>
                <option>已停用</option>
              </select>
            </div>
            <div class="filter-bar-actions">
              <button class="btn btn-primary btn-sm" data-action="filterOptions">查询</button>
              <button class="btn btn-default btn-sm" data-action="resetOptionFilter">重置</button>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <colgroup>
                <col style="width:56px">
                <col>
                <col style="width:140px">
                <col style="width:72px">
                <col style="width:80px">
                <col style="width:180px">
              </colgroup>
              <thead>
                <tr>
                  <th>序号</th>
                  <th>选项名称</th>
                  <th>选项编码</th>
                  <th>排序</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="options-tbody"></tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <span class="pagination-info" id="bc-opt-page-info">共 0 条</span>
            <select class="pagination-size" id="bc-opt-page-size" data-action="changeOptPageSize">
              <option value="10" selected>10条/页</option>
              <option value="20">20条/页</option>
              <option value="50">50条/页</option>
            </select>
            <div class="pagination" id="bc-opt-pagination"></div>
            <div class="pagination-jump">前往<input type="number" min="1" id="bc-opt-jump" class="pagination-jump-input">页<button class="btn btn-default btn-sm" data-action="jumpOptPage">跳转</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="basic-config-data.js?v=2.0"></script>
  <script src="basic-config-modals.js?v=2.0"></script>
  <script src="basic-config-logic.js?v=2.0"></script>
</body>
</html>
