<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>权限管理 - 深圳港集团安全综合管理系统</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../../css/variables.css?v=2.0">
  <link rel="stylesheet" href="../../css/framework.css?v=2.0">
  <link rel="stylesheet" href="../../css/utility.css?v=2.0">
  <style>
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    /* 表头和内容居中 */
    .data-table thead th,
    .data-table tbody td { text-align: center; }
    .data-table thead th:first-child,
    .data-table tbody td:first-child { text-align: left; }

    /* 操作按钮统一间距 */
    .cell-actions { display:inline-flex; align-items:center; gap:4px; flex-wrap:nowrap; }

    /* 菜单类型标签 */
    .tag-dir { background:var(--tag-purple-bg); color:var(--tag-purple-color); border-color:var(--tag-purple-border); }
    .tag-menu { background:var(--tag-info-bg); color:var(--tag-info-color); border-color:var(--tag-info-border); }
    .tag-btn { background:var(--bg-pink-light); color:var(--chart-magenta); border:1px solid var(--color-pink); }
    /* 角色类型标签 */
    .tag-role-common { background:var(--tag-info-bg); color:var(--tag-info-color); border-color:var(--tag-info-border); }
    .tag-role-level { background:var(--tag-success-bg); color:var(--tag-success-color); border-color:var(--tag-success-border); }
    /* 层级标签 */
    .tag-level { display:inline-flex; align-items:center; padding:1px 6px; border-radius:var(--radius-sm); font-size:var(--font-size-11); background:var(--primary-light); color:var(--primary); margin-right:2px; }
    /* 树形表格缩进 */
    .tree-indent { display:inline-block; width:20px; }
    .tree-expand { cursor:pointer; font-size:var(--font-size-11); color:var(--text-description); margin-right:8px; user-select:none; transition:transform .15s; }
    .tree-expand.open { transform:rotate(90deg); display:inline-block; }
    .menu-child-row { display:none; }
    .menu-child-row.open { display:table-row; }
    .btn-child-row { display:none; }
    .btn-child-row.open { display:table-row; }
    /* 数据权限配置面板 */
    .perm-panels { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .perm-panel { border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; }
    .perm-panel-header { padding:12px 16px; background:var(--bg-table-header); font-size:var(--font-size-14); font-weight:500; border-bottom:1px solid var(--border); }
    .perm-panel-body { padding:16px; }
    .perm-config-row { margin-bottom:16px; }
    .perm-config-label { font-size:var(--font-size-13); color:var(--text-secondary); margin-bottom:6px; font-weight:500; }
    .radio-group { display:flex; flex-wrap:wrap; gap:12px; }
    .radio-item { display:flex; align-items:center; gap:4px; font-size:var(--font-size-13); cursor:pointer; }
    .checkbox-group { display:flex; flex-wrap:wrap; gap:8px; }
    .checkbox-item { display:flex; align-items:center; gap:4px; font-size:var(--font-size-13); cursor:pointer; }
    /* 权限树 */
    .perm-tree { border:1px solid var(--border); border-radius:var(--radius-sm); max-height:420px; overflow-y:auto; }
    .perm-tree-node { padding:5px 12px; border-bottom:1px solid var(--border-light); }
    .perm-tree-node:last-child { border-bottom:none; }
    .perm-tree-dir { background:var(--bg-table-header); font-weight:500; }
    .perm-tree-menu { padding-left:28px; }
    .perm-tree-btn { padding-left:48px; color:var(--text-secondary); }
    /* 停用行样式 */
    tr.stopped td { color:var(--text-description); }
    tr.stopped .tag { opacity:.6; }
  </style>
  <script src="../../js/common.js?v=2.0"></script>
</head>
<body class="u-bg-page-px20">

  <div class="card u-p-0">
    <div class="tab-bar" style="padding:0 20px;">
      <div class="tab-item active" data-action="switchTab" data-param="menu">菜单管理</div>
      <div class="tab-item" data-action="switchTab" data-param="role">角色管理</div>
      <div class="tab-item" data-action="switchTab" data-param="dataperm">数据权限</div>
    </div>
    <div style="padding:0 20px 20px;">

  <!-- Tab1 菜单管理 -->
  <div id="tab-menu" class="tab-content active">
    <!-- 查询栏 -->
    <div class="filter-bar">
      <div class="filter-field"><span class="filter-label">菜单名称</span><input class="form-input" id="menu-query-name" placeholder="请输入"></div>
      <div class="filter-field"><span class="filter-label">菜单类型</span><select class="form-input form-select" id="menu-query-type">
          <option value="">全部</option>
          <option value="dir">目录</option>
          <option value="menu">菜单</option>
          <option value="btn">按钮</option>
        </select></div>
      <div class="filter-field"><span class="filter-label">状态</span><select class="form-input form-select" id="menu-query-status">
          <option value="">全部</option>
          <option value="enabled">启用</option>
          <option value="disabled">停用</option>
        </select></div>
      <div class="filter-bar-actions"><button class="btn btn-primary btn-sm">查询</button>
      <button class="btn btn-default btn-sm">重置</button></div>
    </div>
    <!-- 操作栏 -->
    <div style="display:flex; justify-content:flex-end; gap:8px; padding:12px 20px;">
      <button class="btn btn-primary btn-sm" data-action="addMenu">+ 新增菜单</button>
      <button class="btn btn-default btn-sm" data-action="expandAllMenu">展开全部</button>
      <button class="btn btn-default btn-sm" data-action="collapseAllMenu">折叠全部</button>
      <button class="btn btn-default btn-sm">导出</button>
    </div>
      <div class="table-wrap">
      <table class="data-table" style="margin:0 20px;">
        <thead>
          <tr>
            <th>菜单名称</th>
            <th>类型</th>
            <th>路由地址</th>
            <th>排序</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="menu-table-body">
          <!-- JS动态渲染 -->
        </tbody>
      </table>
      </div>
  </div>

  <!-- Tab2 角色管理 -->
  <div id="tab-role" class="tab-content">
    <!-- 查询栏 -->
    <div class="filter-bar">
      <div class="filter-field"><span class="filter-label">角色名称</span><input class="form-input" id="role-query-name" placeholder="请输入"></div>
      <div class="filter-field"><span class="filter-label">角色类型</span><select class="form-input form-select" id="role-query-type">
          <option value="">全部</option>
          <option value="common">通用角色</option>
          <option value="level">层级角色</option>
        </select></div>
      <div class="filter-field"><span class="filter-label">状态</span><select class="form-input form-select" id="role-query-status">
          <option value="">全部</option>
          <option value="enabled">启用</option>
          <option value="disabled">停用</option>
        </select></div>
      <div class="filter-bar-actions"><button class="btn btn-primary btn-sm">查询</button>
      <button class="btn btn-default btn-sm">重置</button></div>
    </div>
    <!-- 操作栏 -->
    <div style="display:flex; justify-content:flex-end; gap:8px; padding:12px 20px;">
      <button class="btn btn-primary btn-sm" data-action="addRole">+ 新增角色</button>
      <button class="btn btn-default btn-sm">导出</button>
    </div>
      <div class="table-wrap">
      <table class="data-table" style="margin:0 20px;">
        <thead>
          <tr>
            <th>序号</th>
            <th>角色名称</th>
            <th>角色编码</th>
            <th>角色类型</th>
            <th>关联层级</th>
            <th>用户数</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="role-table-body">
          <!-- JS动态渲染 -->
        </tbody>
      </table>
      </div>
      <div class="pagination-bar" id="role-pagination">
        <span class="pagination-info">共 7 条</span>
        <select class="pagination-size" id="role-page-size">
          <option value="10" selected>10条/页</option>
          <option value="20">20条/页</option>
          <option value="50">50条/页</option>
        </select>
        <div class="pagination">
          <div class="pagination-page active">1</div>
        </div>
      </div>
  </div>

  <!-- Tab3 数据权限 -->
  <div id="tab-dataperm" class="tab-content">
    <div class="perm-panels" style="padding:16px 20px;">
      <!-- 人员组织维度 -->
      <div class="perm-panel">
        <div class="perm-panel-header">人员组织维度</div>
        <div class="perm-panel-body">
          <div class="perm-config-row">
            <div class="perm-config-label">选择角色</div>
            <select class="form-input form-select u-w-full" id="org-perm-role-select">
              <option value="">请选择角色</option>
              <option value="2">集团安全管理员（GROUP_SAFETY_ADMIN）</option>
              <option value="3">公司安全管理员（COMPANY_SAFETY_ADMIN）</option>
              <option value="4">下属企业安全员（SUB_SAFETY_OFFICER）</option>
              <option value="5">检查员（INSPECTOR）</option>
              <option value="6">培训管理员（TRAINING_ADMIN）</option>
            </select>
          </div>
          <div class="perm-config-row">
            <div class="perm-config-label">可见组织范围</div>
            <div class="radio-group" id="orgScopeGroup">
              <label class="radio-item"><input type="radio" name="orgScope" value="self" checked> 本人<span style="font-size:var(--font-size-11); color:var(--text-description);">（创建人或责任人为当前用户的数据）</span></label>
              <label class="radio-item"><input type="radio" name="orgScope" value="dept"> 本部门</label>
              <label class="radio-item"><input type="radio" name="orgScope" value="company"> 本公司</label>
              <label class="radio-item"><input type="radio" name="orgScope" value="company-sub"> 本企业及下属</label>
              <label class="radio-item"><input type="radio" name="orgScope" value="all"> 全部</label>
            </div>
            <div id="orgScopeHint" style="font-size:var(--font-size-11); color:var(--text-description); margin-top:4px;"></div>
          </div>
          <div style="padding-top:12px; border-top:1px solid var(--border-light);">
            <button class="btn btn-primary btn-sm">保存配置</button>
          </div>
        </div>
      </div>
      <!-- 业务数据分类维度 -->
      <div class="perm-panel">
        <div class="perm-panel-header">业务数据分类维度</div>
        <div class="perm-panel-body">
          <div class="perm-config-row">
            <div class="perm-config-label">选择角色</div>
            <select class="form-input form-select u-w-full">
              <option value="">请选择角色</option>
              <option value="2">集团安全管理员（GROUP_SAFETY_ADMIN）</option>
              <option value="3">公司安全管理员（COMPANY_SAFETY_ADMIN）</option>
              <option value="4">下属企业安全员（SUB_SAFETY_OFFICER）</option>
              <option value="5">检查员（INSPECTOR）</option>
              <option value="6">培训管理员（TRAINING_ADMIN）</option>
            </select>
          </div>
          <div class="perm-config-row">
            <div class="perm-config-label">可见业务数据类型</div>
            <div class="checkbox-group">
              <label class="checkbox-item"><input type="checkbox"> 目标职责数据</label>
              <label class="checkbox-item"><input type="checkbox"> 教育培训数据</label>
              <label class="checkbox-item"><input type="checkbox"> 现场管理数据</label>
              <label class="checkbox-item"><input type="checkbox"> 危险源数据</label>
              <label class="checkbox-item"><input type="checkbox"> 隐患数据</label>
              <label class="checkbox-item"><input type="checkbox"> 安全检查数据</label>
              <label class="checkbox-item"><input type="checkbox"> 风险管控数据</label>
              <label class="checkbox-item"><input type="checkbox"> 作业数据</label>
              <label class="checkbox-item"><input type="checkbox"> 应急数据</label>
              <label class="checkbox-item"><input type="checkbox"> 事故数据</label>
              <label class="checkbox-item"><input type="checkbox"> 考核数据</label>
              <label class="checkbox-item"><input type="checkbox"> 综合管理数据</label>
              <label class="checkbox-item"><input type="checkbox"> 基础保障数据</label>
              <label class="checkbox-item"><input type="checkbox"> 报表数据</label>
            </div>
          </div>
          <div style="padding-top:12px; border-top:1px solid var(--border-light);">
            <button class="btn btn-primary btn-sm">保存配置</button>
          </div>
        </div>
      </div>
    </div>
  </div>

    </div>
  </div>

  <script src="permission-data.js?v=2.0"></script>
  <script src="permission-modals.js?v=2.0"></script>
  <script src="permission-logic.js?v=2.0"></script>
</body>
</html>
