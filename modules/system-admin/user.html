<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 深圳港集团安全综合管理系统</title>
  <link rel="stylesheet" href="../../css/variables.css?v=2.0">
  <link rel="stylesheet" href="../../css/framework.css?v=2.0">
  <link rel="stylesheet" href="../../css/utility.css?v=2.0">
  <style>
    /* 左侧组织树面板扩展 */
    .split-left-title { display:flex; align-items:center; justify-content:space-between; padding-bottom:12px; border-bottom:1px solid var(--border-divider); margin-bottom:12px; }
    .split-left-title span { font-size:var(--font-size-14); font-weight:600; color:var(--text-primary); }
    .split-left .src-search { width:100%; height:28px; font-size:var(--font-size-12); margin-bottom:8px; padding:0 8px; border:1px solid var(--border); border-radius:var(--radius-sm); }
    .split-left-tree { overflow-y:auto; flex:1; min-height:0; }

    /* 树节点 */
    .src-node { padding:4px 6px; border-radius:var(--radius-sm); font-size:var(--font-size-13); cursor:pointer; color:var(--text-primary); display:flex; align-items:center; gap:4px; }
    .src-node:hover { background:var(--bg-hover); }
    .src-node.selected { background:var(--primary-light); color:var(--primary); font-weight:500; }
    .src-node .arrow { font-size:var(--font-size-9); color:var(--text-description); width:14px; height:14px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; transition:transform var(--duration-fast); }
    .src-node .arrow.open { transform:rotate(90deg); }
    .src-node .arrow.empty { visibility:hidden; }
    .src-children { padding-left:14px; }
    .src-children.collapsed { display:none; }

    /* 右侧面板扩展 — min-width 按页面数据列调整 */
    .table-wrap .data-table { min-width:1100px; }

    /* 角色标签 pill */
    .role-pills { display:flex; gap:4px; flex-wrap:wrap; }
    .role-pill { display:inline-flex; align-items:center; padding:1px 8px; border-radius:var(--radius-full); font-size:var(--font-size-11); background:var(--primary-light); color:var(--primary); white-space:nowrap; }

    /* 编辑弹窗 */
    .readonly-field { display:flex; align-items:center; height:var(--input-height); font-size:var(--font-size-13); background:var(--bg-page); border-radius:var(--radius-sm); padding:0 12px; color:var(--text-primary); font-weight:500; }
    .readonly-field.readonly-sm { height:30px; font-size:var(--font-size-12); }
    .gender-radio-group { display:flex; align-items:center; gap:16px; height:var(--input-height); }
    .gender-radio-item { display:flex; align-items:center; gap:4px; font-size:var(--font-size-13); cursor:pointer; }
    .gender-radio-item input[type="radio"] { accent-color:var(--primary); }
    .status-switch-row { display:flex; align-items:center; gap:12px; height:var(--input-height); }
    .status-switch-row .current-status { font-size:var(--font-size-13); font-weight:500; }

    /* 多账号标记 */
    .multi-account-badge { display:inline-flex; align-items:center; gap:2px; padding:1px 6px; border-radius:var(--radius-full); font-size:var(--font-size-10); background:var(--warning-light); color:var(--warning); white-space:nowrap; cursor:pointer; }

    /* 角色选择 checkbox 组 */
    .role-checkbox-group { display:flex; flex-wrap:wrap; gap:8px 16px; }
    .role-checkbox-item { display:flex; align-items:center; gap:4px; font-size:var(--font-size-13); cursor:pointer; padding:4px 0; }
    .role-checkbox-item input[type="checkbox"] { accent-color:var(--primary); }

    /* 多账号弹窗 */
    .account-list { margin-top:12px; }
    .account-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border:1px solid var(--border-light); border-radius:var(--radius-sm); margin-bottom:8px; }
    .account-item .acc-login { font-size:var(--font-size-13); color:var(--text-primary); font-weight:500; font-family:monospace; min-width:80px; }
    .account-item .acc-org { font-size:var(--font-size-12); color:var(--text-description); flex:1; }
  </style>
  <script src="../../js/common.js?v=2.0"></script>
</head>
<body style="padding:20px 20px 0 20px; background:var(--bg-page); height:100vh; display:flex; flex-direction:column; overflow:hidden;">
  <div class="card" style="padding:0; overflow:hidden; flex:1; display:flex; flex-direction:column; min-height:0;">
    <div class="split-layout" style="padding:0; flex:1; min-height:0;">
      <!-- 左侧：组织架构树 -->
      <div class="split-left">
        <div class="split-left-title"><span>组织架构</span></div>
        <label class="switch-label" style="margin-bottom:8px;">查看选中单位本级数据<span class="switch"><input type="checkbox" id="local-only-toggle" onchange="applyFilters()"><span class="switch-slider"></span></span></label>
        <input class="src-search" id="org-tree-search" placeholder="搜索组织..." oninput="filterLeftTree(this.value)">
        <div class="split-left-tree" id="org-tree-container"></div>
      </div>

      <!-- 右侧：查询 + 列表 -->
      <div class="split-right">
        <!-- 查询栏 -->
        <div class="filter-bar">          <div class="filter-field"><span class="filter-label">姓名/账号</span><input class="form-input" id="filter-keyword" placeholder="请输入" style="width:120px"></div>
          <div class="filter-field"><span class="filter-label">状态</span><select class="form-input form-select" id="filter-status" style="width:100px">
              <option value="">全部</option>
              <option value="启用">启用</option>
              <option value="停用">停用</option>
              <option value="待激活">待激活</option>
            </select></div>
          <div class="filter-field"><span class="filter-label">角色</span><select class="form-input form-select" id="filter-role" style="width:120px">
              <option value="">全部</option>
              <option value="系统管理员">系统管理员</option>
              <option value="安全管理员">安全管理员</option>
              <option value="安全主管">安全主管</option>
              <option value="检查员">检查员</option>
              <option value="施工负责人">施工负责人</option>
              <option value="普通用户">普通用户</option>
            </select></div>
          <div class="filter-bar-actions"><button class="btn btn-primary query-btn" data-action="applyFilters">查询</button>
          <button class="btn btn-default query-btn" data-action="resetFilters">重置</button></div>
        </div>
        <!-- 操作按钮行 -->
        <div class="filter-actions-row" style="padding-right:30px;">
          <button class="btn btn-default" data-action="syncUsers">同步</button>
        </div>

        <!-- 单一表格：sticky 表头 -->
        <div class="table-wrap">
          <table class="data-table">
            <colgroup>
              <col style="width:50px"><col style="width:110px"><col style="width:100px"><col class="u-w-80"><col style="width:110px"><col style="width:160px"><col style="width:160px"><col style="width:70px"><col style="width:150px"><col>
            </colgroup>
            <thead>
              <tr>
                <th>序号</th>
                <th>用户编号</th>
                <th>用户账号</th>
                <th>用户姓名</th>
                <th>手机号码</th>
                <th>组织机构</th>
                <th>原OA组织机构</th>
                <th>状态</th>
                <th>角色类型</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="user-tbody"></tbody>
          </table>
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">&#128100;</div>
            <div>未找到匹配的用户</div>
          </div>
        </div>

        <!-- 分页 -->
        <div class="pagination-bar">
          <span class="pagination-info" id="page-info">共 0 条</span>
          <select class="pagination-size" id="page-size" onchange="changePageSize()">
            <option value="10" selected>10条/页</option>
            <option value="20">20条/页</option>
            <option value="50">50条/页</option>
            <option value="100">100条/页</option>
          </select>
          <div class="pagination" id="pagination"></div>
          <div class="pagination-jump">前往<input type="number" min="1" id="jump-page" class="pagination-jump-input" onkeydown="if(event.key==='Enter'){event.preventDefault();jumpToPage();}">页<button type="button" class="btn btn-default btn-sm" data-action="jumpToPage">跳转</button></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑用户弹窗 -->
  <div class="modal-overlay" id="modal-user">
    <div class="modal">
      <div class="modal-header" id="modal-user-title"><h3>编辑用户</h3><button class="btn btn-text btn-sm" data-action="hideModal" data-param="modal-user" class="u-fs18-desc">&times;</button></div>
      <div class="modal-body">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 20px;">
          <!-- 1. 用户编号（只读） -->
          <div class="form-group">
            <label class="form-label">用户编号</label>
            <div class="form-content"><div class="readonly-field" id="user-no"></div></div>
          </div>
          <!-- 2. 用户账号（只读） -->
          <div class="form-group">
            <label class="form-label">用户账号</label>
            <div class="form-content"><div class="readonly-field" id="user-login-display"></div></div>
          </div>
          <!-- 3. 用户姓名 -->
          <div class="form-group">
            <label class="form-label"><span class="required">*</span>用户姓名</label>
            <div class="form-content"><input class="form-input" id="user-name" placeholder="请输入姓名"></div>
          </div>
          <!-- 4. 手机号码 -->
          <div class="form-group">
            <label class="form-label">手机号码</label>
            <div class="form-content"><input class="form-input" id="user-phone" placeholder="请输入手机号"></div>
          </div>
          <!-- 5. 用户性别 -->
          <div class="form-group">
            <label class="form-label">用户性别</label>
            <div class="form-content">
              <div class="gender-radio-group">
                <label class="gender-radio-item"><input type="radio" name="user-gender" value="男"> 男</label>
                <label class="gender-radio-item"><input type="radio" name="user-gender" value="女"> 女</label>
              </div>
            </div>
          </div>
          <!-- 6. 状态 -->
          <div class="form-group">
            <label class="form-label">状态</label>
            <div class="form-content">
              <div class="status-switch-row">
                <span class="current-status" id="user-current-status">启用</span>
                <label class="switch-label u-mb-0"><span class="switch"><input type="checkbox" id="user-status-toggle"><span class="switch-slider"></span></span></label>
                <span style="font-size:var(--font-size-12); color:var(--text-description);" id="user-status-hint">关闭则停用</span>
              </div>
            </div>
          </div>
          <!-- 7. 组织机构（只读） -->
          <div class="form-group">
            <label class="form-label">组织机构</label>
            <div class="form-content"><div class="readonly-field" id="user-org-display"></div></div>
          </div>
          <!-- 8. 原OA组织机构（只读） -->
          <div class="form-group">
            <label class="form-label">原OA组织机构</label>
            <div class="form-content"><div class="readonly-field" id="user-oa-org"></div></div>
          </div>
          <!-- 9. 角色类型 -->
          <div class="form-group" style="grid-column:span 2;">
            <label class="form-label"><span class="required">*</span>角色类型</label>
            <div class="form-content">
              <div class="role-checkbox-group" id="user-roles">
                <label class="role-checkbox-item"><input type="checkbox" value="系统管理员"> 系统管理员</label>
                <label class="role-checkbox-item"><input type="checkbox" value="安全管理员"> 安全管理员</label>
                <label class="role-checkbox-item"><input type="checkbox" value="安全主管"> 安全主管</label>
                <label class="role-checkbox-item"><input type="checkbox" value="检查员"> 检查员</label>
                <label class="role-checkbox-item"><input type="checkbox" value="施工负责人"> 施工负责人</label>
                <label class="role-checkbox-item"><input type="checkbox" value="普通用户"> 普通用户</label>
              </div>
            </div>
          </div>
          <!-- 10. 入职时间（只读） -->
          <div class="form-group">
            <label class="form-label">入职时间</label>
            <div class="form-content"><div class="readonly-field" id="user-hire-date-display"></div></div>
          </div>
          <!-- 占位保持对齐 -->
          <div></div>
          <!-- 11. 备注 -->
          <div class="form-group" style="grid-column:span 2;">
            <label class="form-label">备注</label>
            <div class="form-content"><textarea class="form-input" id="user-remark" style="height:72px; padding:8px 12px; resize:none;" placeholder="请输入备注信息"></textarea></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" data-action="hideModal" data-param="modal-user">取消</button>
        <button class="btn btn-primary" id="modal-user-confirm" data-action="submitUserForm">保存</button>
      </div>
    </div>
  </div>

  <!-- 多账号查看弹窗 -->
  <div class="modal-overlay" id="modal-accounts">
    <div class="modal">
      <div class="modal-header" id="accounts-title"><h3>关联账号</h3><button class="btn btn-text btn-sm" data-action="hideModal" data-param="modal-accounts" class="u-fs18-desc">&times;</button></div>
      <div class="modal-body">
        <div class="account-list" id="accounts-list"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" data-action="hideModal" data-param="modal-accounts">关闭</button>
      </div>
    </div>
  </div>

  <!-- 操作确认弹窗 -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal">
      <div class="modal-header"><h3 id="confirm-title">操作确认</h3><button class="btn btn-text btn-sm" data-action="hideModal" data-param="modal-confirm" class="u-fs18-desc">&times;</button></div>
      <div class="modal-body">
        <div id="confirm-message" style="font-size:var(--font-size-14); color:var(--text-primary); line-height:1.6;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" data-action="hideModal" data-param="modal-confirm">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="user-data.js"></script>
  <script src="user-logic.js"></script>
  <script>
  (function() {
    document.addEventListener('click', function(e) {
      var el = e.target.closest('[data-action]');
      if (!el) return;
      var action = el.getAttribute('data-action');
      var param = el.getAttribute('data-param');
      switch (action) {
        case 'applyFilters':
          currentPage = 1;
          applyFilters();
          break;
        case 'resetFilters':
          resetFilters();
          break;
        case 'syncUsers':
          syncUsers();
          break;
        case 'jumpToPage':
          jumpToPage();
          break;
        case 'submitUserForm':
          submitUserForm();
          break;
        case 'hideModal':
          if (param) hideModal(param);
          break;
      }
    });
    // Backdrop click to close modals
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('modal-overlay')) {
        hideModal(e.target.id);
      }
    });
  })();
  </script>
</body>
</html>
