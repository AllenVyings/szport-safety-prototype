<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组织保障 - 深圳港集团安全综合管理系统</title>
  <link rel="stylesheet" href="../../css/variables.css?v=2.0">
  <link rel="stylesheet" href="../../css/framework.css?v=2.0">
  <link rel="stylesheet" href="../../css/utility.css?v=2.0">
  <style>
    body { padding:20px 20px 0; background:var(--bg-page); height:100vh; display:flex; flex-direction:column; overflow:hidden; box-sizing:border-box; }
    .page-header { flex-shrink:0; margin-bottom:12px; }
    .page-header h1 { margin:0; font-size:var(--font-size-18); font-weight:600; }
    .page-card { flex:1; min-height:0; display:flex; flex-direction:column; padding:0; overflow:hidden; }
    .page-card .split-layout { margin-top:0; flex:1; min-height:0; }
    .sb-tree-panel { width:300px; min-width:300px; display:flex; flex-direction:column; min-height:0; }
    .split-left-title { display:flex; align-items:center; justify-content:space-between; padding-bottom:10px; border-bottom:1px solid var(--border-divider); margin-bottom:10px; flex-shrink:0; }
    .split-left-title span { font-size:var(--font-size-14); font-weight:600; }
    .sb-tree-search { width:100%; height:28px; font-size:var(--font-size-12); margin-bottom:8px; padding:0 8px; border:1px solid var(--border); border-radius:var(--radius-sm); flex-shrink:0; }
    #org-tree-container { flex:1; min-height:0; overflow-y:auto; }
    .src-node { padding:5px 6px; border-radius:var(--radius-sm); font-size:var(--font-size-13); cursor:pointer; color:var(--text-primary); display:flex; align-items:center; gap:4px; margin-bottom:2px; }
    .src-node:hover:not(.disabled-node) { background:var(--bg-hover); }
    .src-node.selected { background:var(--primary-light); color:var(--primary); font-weight:500; }
    .src-node .arrow { font-size:var(--font-size-9); color:var(--text-description); width:14px; height:14px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; transition:transform var(--duration-fast); }
    .src-node .arrow.open { transform:rotate(90deg); }
    .src-node .arrow.empty { visibility:hidden; pointer-events:none; }
    .src-node .node-icon { font-size:var(--font-size-10); width:18px; height:18px; border-radius:var(--radius-sm); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .src-node .node-icon.unit { background:var(--primary-light); color:var(--primary); }
    .src-node .node-icon.dept { background:var(--bg-gray-lighter); color:var(--text-description); }
    .src-node .node-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .src-node mark { background:var(--warning-light); color:inherit; padding:0 1px; }
    .src-children.collapsed { display:none; }
    .sb-tree-tag { font-size:var(--font-size-10); padding:0 5px; border-radius:var(--radius-sm); flex-shrink:0; white-space:nowrap; }
    .sb-tree-tag.tag-success { background:var(--success-light); color:var(--success); }
    .sb-tree-tag.tag-warning { background:var(--warning-light); color:var(--warning); }
    .sb-tree-tag.tag-default { background:var(--bg-gray-lighter); color:var(--text-description); }
    .sb-tree-empty { padding:16px 8px; text-align:center; color:var(--text-description); font-size:var(--font-size-12); }
    .sb-main-panel { display:flex; flex-direction:column; min-height:0; padding:0 !important; background:var(--bg-card); }
    .sb-tab-wrap {
      flex-shrink:0;
      padding:0 20px;
      background:var(--bg-card);
      border-bottom:1px solid var(--border-divider);
    }
    #sb-tab-bar {
      display:flex;
      align-items:flex-end;
      gap:2px;
      margin:0;
      border-bottom:none;
      min-height:44px;
    }
    #sb-tab-bar .tab-item {
      position:relative;
      padding:11px 18px 10px;
      font-size:var(--font-size-14);
      line-height:1.4;
      color:var(--text-secondary);
      cursor:pointer;
      background:transparent;
      border:none;
      border-radius:var(--radius-sm) var(--radius-sm) 0 0;
      margin-bottom:-1px;
      transition:color var(--duration-fast), background var(--duration-fast);
      user-select:none;
      white-space:nowrap;
    }
    #sb-tab-bar .tab-item:hover {
      color:var(--primary);
      background:var(--primary-5);
    }
    #sb-tab-bar .tab-item.active {
      color:var(--primary);
      font-weight:var(--font-weight-semibold);
      background:var(--bg-card);
    }
    #sb-tab-bar .tab-item.active::after {
      content:'';
      position:absolute;
      left:14px;
      right:14px;
      bottom:0;
      height:2px;
      background:var(--primary);
      border-radius:2px 2px 0 0;
    }
    .sb-tab-body { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; background:var(--bg-card); }
    .sb-tab-pane { display:none; flex:1; min-height:0; flex-direction:column; padding:16px 20px 20px; overflow:hidden; }
    .sb-tab-pane.active { display:flex; }
    #unit-banner {
      flex-shrink:0;
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:6px 8px;
      padding:8px 12px;
      margin-bottom:12px;
      font-size:var(--font-size-13);
      line-height:1.5;
      color:var(--text-secondary);
      background:var(--bg-gray-lighter);
      border-radius:var(--radius-sm);
      border:1px solid var(--border-light);
    }
    #unit-banner strong { color:var(--text-primary); font-weight:var(--font-weight-semibold); }
    .sb-pending-banner { display:none; margin-bottom:12px; padding:10px 14px; background:var(--warning-light); border:1px solid var(--warning-border); border-radius:var(--radius-sm); font-size:var(--font-size-13); color:var(--warning); flex-shrink:0; }
    .chart-area { flex:1; min-height:0; overflow:auto; padding:16px; background:var(--bg-gray-lighter); border-radius:var(--radius-md); border:1px solid var(--border-light); }
    #chart-container { max-width:720px; margin:0 auto; }
    .chart-node { padding:14px 22px; border:2px solid var(--success); border-radius:var(--radius-md); background:var(--success-light); text-align:center; min-width:260px; max-width:100%; margin:0 auto; }
    .chart-node-clickable { cursor:pointer; transition:box-shadow var(--duration-fast), transform var(--duration-fast); }
    .chart-node-clickable:hover { box-shadow:0 4px 12px rgba(0,180,42,0.15); transform:translateY(-1px); }
    .chart-node .node-title { font-size:var(--font-size-15); font-weight:600; color:var(--success); }
    .chart-node .node-sub { font-size:var(--font-size-12); color:var(--text-secondary); margin-top:6px; line-height:1.45; }
    .chart-node .node-hint { font-size:var(--font-size-11); color:var(--primary); margin-top:8px; }
    .chart-line { width:2px; height:22px; background:var(--border-dark); margin:0 auto; }
    .chart-post-layer { text-align:center; width:100%; }
    .chart-post-layer-title { font-size:var(--font-size-12); color:var(--text-description); margin-bottom:10px; }
    .chart-posts { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .chart-post-card { padding:10px 16px; min-width:140px; border:1px dashed var(--border-dark); border-radius:var(--radius-md); background:var(--bg-card); text-align:left; }
    .chart-post-card .post-name { font-size:var(--font-size-12); color:var(--text-description); margin-bottom:4px; }
    .chart-post-card .post-person { font-size:var(--font-size-14); font-weight:500; color:var(--text-primary); }
    #config-container { flex:1; min-height:0; overflow-y:auto; }
    .section-block { border:1px solid var(--border-light); border-radius:var(--radius-md); margin-bottom:14px; background:var(--bg-card); }
    .section-block-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border-light); }
    .section-block-title { font-size:var(--font-size-14); font-weight:600; }
    .section-block-body { padding:14px 16px; }
    .block-name { font-size:var(--font-size-15); font-weight:600; margin-bottom:8px; }
    .section-desc, .attach-line { font-size:var(--font-size-13); color:var(--text-secondary); line-height:1.55; margin-bottom:10px; }
    .field-label { font-size:var(--font-size-12); color:var(--text-description); margin:10px 0 6px; }
    .member-list { display:flex; flex-wrap:wrap; gap:8px; }
    .member-tag { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--bg-gray-lighter); border-radius:var(--radius-sm); font-size:var(--font-size-13); }
    .member-tag .role { font-size:var(--font-size-11); color:var(--text-description); }
    .sb-empty { text-align:center; padding:40px 20px; color:var(--text-description); font-size:var(--font-size-14); line-height:1.65; }
    .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:900; opacity:0; pointer-events:none; transition:opacity var(--duration-normal); }
    .drawer-mask.open { opacity:1; pointer-events:auto; }
    .drawer-panel { position:fixed; top:0; right:0; width:420px; max-width:100%; height:100%; background:var(--bg-card); z-index:901; box-shadow:-4px 0 16px rgba(0,0,0,0.12); transform:translateX(100%); transition:transform var(--duration-normal); display:flex; flex-direction:column; }
    .drawer-panel.open { transform:translateX(0); }
    .drawer-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border-light); }
    .drawer-header h3 { margin:0; font-size:var(--font-size-16); }
    .drawer-body { flex:1; overflow-y:auto; padding:16px 20px; }
    .drawer-field { margin-bottom:14px; }
    .drawer-field label { display:block; font-size:var(--font-size-12); color:var(--text-secondary); margin-bottom:6px; }
    .drawer-field .form-input { width:100%; box-sizing:border-box; }
    .member-row { display:grid; grid-template-columns:1fr 100px auto; gap:8px; margin-bottom:8px; align-items:center; }
    .drawer-footer { padding:14px 20px; border-top:1px solid var(--border-light); display:flex; gap:8px; justify-content:flex-end; }
    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--bg-card); border-radius:var(--radius-lg); max-height:80vh; overflow-y:auto; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border-light); }
    .modal-header h3 { font-size:var(--font-size-16); margin:0; }
    .modal-body { padding:20px; }
    .modal-footer { padding:12px 20px; border-top:1px solid var(--border-light); display:flex; justify-content:flex-end; gap:8px; }
  </style>
  <script src="../../js/common.js?v=2.0"></script>
</head>
<body>

  <div class="card page-card">
    <div class="split-layout">
      <aside class="split-left sb-tree-panel">
        <div class="split-left-title"><span>单位组织</span></div>
        <input type="search" class="sb-tree-search" id="org-tree-search" placeholder="搜索单位名称…" oninput="sbFilterOrgTree(this.value)">
        <div id="org-tree-container"></div>
      </aside>

      <div class="split-right sb-main-panel">
        <div class="sb-tab-wrap">
          <div class="tab-bar" id="sb-tab-bar" role="tablist">
            <div class="tab-item active" role="tab" aria-selected="true" data-action="switchSbTab" data-param="chart">安全组织架构图</div>
            <div class="tab-item" role="tab" aria-selected="false" data-action="switchSbTab" data-param="config">机构与职责配置</div>
          </div>
        </div>

        <div class="sb-tab-body">
          <div id="tab-chart" class="sb-tab-pane active">
            <div id="unit-banner"></div>
            <div id="sb-unconfigured-hint" style="display:none;margin-bottom:12px;padding:10px 14px;background:var(--primary-light);border:1px solid var(--primary-border);border-radius:var(--radius-sm);font-size:var(--font-size-13);color:var(--primary);flex-shrink:0;">该单位尚未配置安全组织体系，请点击"机构与职责配置"Tab进行设置</div>
            <div id="sb-pending-banner" class="sb-pending-banner"></div>
            <div class="chart-area">
              <div id="chart-container"></div>
            </div>
          </div>

          <div id="tab-config" class="sb-tab-pane">
            <div id="config-container"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="sb-drawer-mask" class="drawer-mask" data-action="closeSbDrawer"></div>
  <aside id="sb-drawer" class="drawer-panel" aria-hidden="true">
    <div class="drawer-header">
      <h3 id="sb-drawer-title">编辑</h3>
      <button type="button" class="btn btn-text btn-sm" data-action="closeSbDrawer" aria-label="关闭">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-field">
        <label><span class="u-text-error">*</span> 名称</label>
        <input type="text" class="form-input" id="sb-field-name" placeholder="安委会/安委办名称">
      </div>
      <div class="drawer-field">
        <label><span class="u-text-error">*</span> 职责描述</label>
        <textarea class="form-input" id="sb-field-duty" rows="4" placeholder="职责描述"></textarea>
      </div>
      <div class="drawer-field" id="sb-field-attach">
        <label>挂靠说明（文字，不绑定组织树部门）</label>
        <input type="text" class="form-input" id="sb-field-attach-input" placeholder="如：挂靠本单位安全管理与环保部">
      </div>
      <div class="drawer-field">
        <label><span class="u-text-error">*</span> 成员（从用户管理选择）及职务</label>
        <div id="sb-members-editor"></div>
        <button type="button" class="btn btn-default btn-sm" style="margin-top:8px;" data-action="sbAddMember">+ 添加成员</button>
      </div>
    </div>
    <div class="drawer-footer">
      <button type="button" class="btn btn-default" data-action="closeSbDrawer">取消</button>
      <button type="button" class="btn btn-primary" id="sb-drawer-save" data-action="sbSaveGroup">保存</button>
    </div>
  </aside>

  <!-- 确认删除弹窗 -->
  <div class="modal-overlay" id="modal-sb-confirm">
    <div class="modal" style="width:420px;">
      <div class="modal-header">
        <h3 id="sb-confirm-title">确认操作</h3>
        <button class="btn btn-text" data-action="hideModal" data-param="'modal-sb-confirm'">&times;</button>
      </div>
      <div class="modal-body">
        <p id="sb-confirm-msg" style="font-size:var(--font-size-14); color:var(--text-primary);">确定要执行此操作吗？</p>
        <p style="font-size:var(--font-size-12); color:var(--text-tertiary); margin-top:8px;">此操作不可撤销。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" data-action="hideModal" data-param="'modal-sb-confirm'">取消</button>
        <button class="btn btn-primary" style="background:var(--error);" data-action="sbConfirmDelete">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 组织架构详情页 -->
  <div id="view-detail" class="page-view">
    <div class="card u-p-0">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;">
        <div id="org-detail-title" style="font-size:var(--font-size-16);font-weight:600;">组织架构详情</div>
        <button type="button" style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:var(--radius-full);background:var(--primary-light);color:var(--primary);font-size:var(--font-size-13);border:none;cursor:pointer;" data-action="showOrgList">← 返回列表</button>
      </div>
      <div style="padding:20px 24px 24px;">
        <div class="u-flex u-gap-16">
          <div class="u-flex-1">
            <div class="card">
              <div class="detail-section">
                <div class="detail-section-title">机构信息</div>
                <div id="org-detail-basic"></div>
              </div>
            </div>
            <div class="card">
              <div class="detail-section">
                <div class="detail-section-title">职责与成员</div>
                <div id="org-detail-desc" style="font-size:var(--font-size-13);color:var(--text-secondary);line-height:1.8;"></div>
              </div>
            </div>
          </div>
          <div class="detail-panel">
            <div class="card">
              <div class="detail-section">
                <div class="detail-section-title">修订记录</div>
                <div id="org-detail-timeline" class="timeline"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../system-admin/user-data.js"></script>
  <script src="org-data.js"></script>
  <script src="org-logic.js"></script>
</body>
</html>
