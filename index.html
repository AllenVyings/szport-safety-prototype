<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深圳港集团安全综合管理系统 V2.0</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css?v=2.0">
  <link rel="stylesheet" href="css/framework.css?v=2.0">

  <!-- 配置 -->
  <script src="config/menus.js?v=2.0"></script>

  <!-- 核心 -->
  <script src="js/app.js?v=2.0"></script>

  <style>
    body { opacity: 0; transition: opacity 0.3s; }
    body.loaded { opacity: 1; }

    .item-badge {
      font-size: 10px;
      padding: 1px 6px;
      background: var(--primary);
      color: var(--text-inverse);
      border-radius: var(--radius-full);
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 顶部栏 -->
    <header class="top-header">
      <div class="top-header-left">
        <div class="top-header-logo">
          <div class="logo-icon">⚓</div>
          <span>深圳港集团安全综合管理系统</span>
        </div>
      </div>
      <div class="top-header-right">
        <div class="header-user">
          <div class="header-user-avatar">管</div>
          <span>管理员</span>
        </div>
        <button class="header-btn" onclick="if(confirm('确认退出系统？')){console.log('退出登录')}">退出</button>
      </div>
    </header>

    <!-- 主体 -->
    <div class="app-body">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <nav class="sidebar-menu" id="sidebarMenu"></nav>
      </aside>

      <!-- 内容区 -->
      <main class="main-content">
        <div class="content-breadcrumb" id="breadcrumb">
          <span class="breadcrumb-current">系统首页</span>
        </div>
        <div class="content-wrapper" style="padding:0; overflow:hidden;">
          <iframe id="contentFrame" src="" style="width:100%; height:100%; border:none;"></iframe>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
